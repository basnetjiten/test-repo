name: lightrag-server

# Standalone LightRAG — no external database required.
# All storage is file-based (JSON + NetworkX), mounted to ./data/
# Set your OpenAI API key in the LLM_BINDING_API_KEY and EMBEDDING_BINDING_API_KEY below.

services:
  lightrag:
    image: ghcr.io/hkuds/lightrag:v1.5.0rc2
    container_name: lightrag
    working_dir: /app
    # No command override — the image entrypoint (lightrag_server.py) reads all config from env vars
    ports:
      - "${PORT:-9621}:${PORT:-9621}"
    environment:
      # ── Server ────────────────────────────────────────────────
      HOST: "0.0.0.0"
      PORT: "${PORT:-9621}"
      WORKERS: "${WORKERS:-1}"
      TIMEOUT: "${TIMEOUT:-180}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      WORKING_DIR: "/app/data/rag_storage"
      INPUT_DIR: "/app/data/inputs"
      PROMPT_DIR: "/app/data/prompts"
      WORKSPACE: "${WORKSPACE:-default}"
      WEBUI_TITLE: "${WEBUI_TITLE:-EBProcess LightRAG}"
      WEBUI_DESCRIPTION: "${WEBUI_DESCRIPTION:-Standalone LightRAG knowledge graph server}"
      SUMMARY_LANGUAGE: "${SUMMARY_LANGUAGE:-English}"
      OLLAMA_EMULATING_MODEL_TAG: "${OLLAMA_EMULATING_MODEL_TAG:-latest}"

      # ── Auth ──────────────────────────────────────────────────
      LIGHTRAG_API_KEY: "${LIGHTRAG_API_KEY:-rH8Q1J6mWKNS1sREkzp3b2Yh79FpHjhA}"
      WHITELIST_PATHS: "${WHITELIST_PATHS:-/health}"
      AUTH_ACCOUNTS: "${AUTH_ACCOUNTS:-admin:LightRAG_Admin_2026!}"
      TOKEN_SECRET: "${TOKEN_SECRET:-eqteL9bv4pkgDi7JuZdsp59SG_nGLhnk4DIacuS5ha6ilUgPuMgBhRye4YJnpTYe}"
      TOKEN_EXPIRE_HOURS: "${TOKEN_EXPIRE_HOURS:-8}"

      # ── Document pipeline ─────────────────────────────────────
      LIGHTRAG_PARSER: "${LIGHTRAG_PARSER:-*:native-teP;*:legacy-R}"
      ENTITY_EXTRACTION_USE_JSON: "${ENTITY_EXTRACTION_USE_JSON:-true}"
      MAX_PARALLEL_INSERT: "${MAX_PARALLEL_INSERT:-2}"
      MAX_ASYNC_LLM: "${MAX_ASYNC_LLM:-4}"
      VLM_PROCESS_ENABLE: "${VLM_PROCESS_ENABLE:-false}"
      MAX_UPLOAD_SIZE: "${MAX_UPLOAD_SIZE:-104857600}"

      # ── LLM — OpenAI ─────────────────────────────────────────
      LLM_BINDING: "${LLM_BINDING:-openai}"
      LLM_BINDING_HOST: "${LLM_BINDING_HOST:-https://api.openai.com/v1}"
      LLM_BINDING_API_KEY: "${LLM_BINDING_API_KEY:-YOUR_OPENAI_API_KEY_HERE}"
      LLM_MODEL: "${LLM_MODEL:-gpt-4o-mini}"
      EXTRACT_LLM_MODEL: "${EXTRACT_LLM_MODEL:-gpt-4o-mini}"
      KEYWORD_LLM_MODEL: "${KEYWORD_LLM_MODEL:-gpt-4o-mini}"
      QUERY_LLM_MODEL: "${QUERY_LLM_MODEL:-gpt-4o-mini}"

      # ── Embedding — OpenAI ────────────────────────────────────
      EMBEDDING_BINDING: "${EMBEDDING_BINDING:-openai}"
      EMBEDDING_BINDING_HOST: "${EMBEDDING_BINDING_HOST:-https://api.openai.com/v1}"
      EMBEDDING_BINDING_API_KEY: "${EMBEDDING_BINDING_API_KEY:-YOUR_OPENAI_API_KEY_HERE}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-text-embedding-3-small}"
      EMBEDDING_DIM: "${EMBEDDING_DIM:-1536}"
      EMBEDDING_TOKEN_LIMIT: "${EMBEDDING_TOKEN_LIMIT:-8192}"
      EMBEDDING_SEND_DIM: "${EMBEDDING_SEND_DIM:-false}"
      EMBEDDING_USE_BASE64: "${EMBEDDING_USE_BASE64:-true}"
      OLLAMA_LLM_NUM_CTX: "${OLLAMA_LLM_NUM_CTX:-16384}"
      OLLAMA_EMBEDDING_NUM_CTX: "${OLLAMA_EMBEDDING_NUM_CTX:-8192}"

      # ── Reranking ─────────────────────────────────────────────
      RERANK_BINDING: "${RERANK_BINDING:-null}"

      # ── Storage — fully file-based or PostgreSQL ──────────────
      LIGHTRAG_KV_STORAGE: "${LIGHTRAG_KV_STORAGE:-JsonKVStorage}"
      LIGHTRAG_DOC_STATUS_STORAGE: "${LIGHTRAG_DOC_STATUS_STORAGE:-JsonDocStatusStorage}"
      LIGHTRAG_VECTOR_STORAGE: "${LIGHTRAG_VECTOR_STORAGE:-NanoVectorDBStorage}"
      LIGHTRAG_GRAPH_STORAGE: "${LIGHTRAG_GRAPH_STORAGE:-NetworkXStorage}"
      POSTGRES_HOST: "${POSTGRES_HOST:-postgres}"
      POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
      POSTGRES_USER: "${POSTGRES_USER:-lightrag}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-}"
      POSTGRES_DATABASE: "${POSTGRES_DATABASE:-lightrag}"

    volumes:
      - ./data/rag_storage:/app/data/rag_storage
      - ./data/inputs:/app/data/inputs
      - ./data/prompts:/app/data/prompts

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9621/health').read()"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

    restart: unless-stopped

    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ---------------------------------------------------------------------------
  # Custom FastAPI Backend and Premium Frontend
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: lightrag-backend
    ports:
      - "8088:8088"
    environment:
      LIGHTRAG_BASE_URL: "http://lightrag:9621"
      LIGHTRAG_API_KEY: "${LIGHTRAG_API_KEY:-}"
      CODA_API_TOKEN: "${CODA_API_TOKEN:-}"
    depends_on:
      lightrag:
        condition: service_healthy
    volumes:
      - ./frontend:/app/frontend
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Nginx reverse proxy — optional
  # Start with: docker compose --profile proxy up -d
  # ---------------------------------------------------------------------------
  proxy:
    profiles: ["proxy"]
    image: nginx:1.27-alpine
    depends_on:
      lightrag:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./nginx/lightrag.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Ollama Local LLM & Embedding Service
  # ---------------------------------------------------------------------------
  ollama:
    profiles: ["local-llm"]
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "${OLLAMA_EXPOSED_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

networks:
  default:
    name: lightrag-shared

volumes:
  ollama_data:

