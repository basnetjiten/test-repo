description: |
  ## Objective
  Create the API contract layer: schema, repository, and GraphQL DTOs for the Enquiry feature.

  ## Steps
  1. Create schema at `libs/data-access/src/enquiry/enquiry.schema.ts`
     - Fields: name (string, required), email (string, required), phone (string, optional), message (string, required)
     - Use @Schema({ timestamps: true })
  2. Create repository at `libs/data-access/src/enquiry/enquiry.repository.ts`
     - Extend BaseRepo<EnquiryDocument>
  3. Create CreateEnquiryInput DTO with class-validator decorators
  4. Create EnquiryResponse ObjectType
  5. Register in mongoose-models.ts and providers.ts

  ## Verification
  ```bash
  npm run build:api
  ```
