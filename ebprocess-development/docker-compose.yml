services:

  opencode:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4096:4096"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENCODE_API_KEY: ${OPENCODE_API_KEY}
    volumes:
      - ~/.local/share/opencode:/root/.local/share/opencode:rw
      - ./workspace:/workspace:rw
      - ./.opencode:/.opencode:rw
      - ./.opencode:/root/.config/opencode:rw
      - .:/project:ro
    entrypoint: ["sh", "-c", "opencode serve --port 4096 --hostname 0.0.0.0 --print-logs"]

  # ── ebsprinter-db Postgres database ──────────────────────────────────────────
  ebsprinter-db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - .postgres_data:/var/lib/postgresql/data:rw

  # ── ebprocess Orchestration API ──────────────────────────────────────────
  ebprocess:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Point to the sibling opencode container by service name
      OPENCODE_SERVER_URL: http://opencode:4096
      # Override POSTGRES_URL to use Docker service name (resolves inside Docker network)
      POSTGRES_URL: postgresql://postgres:NewPassword@ebsprinter-db:5432/ebsprinterDb
      # Paths inside the container
      WORKSPACE_DIR: /workspace
      OPENCODE_PROJECT_DIR: /.opencode
    volumes:
      # Same shared volumes so ebprocess can read/write plans and workspaces
      - ./.opencode:/.opencode
      - ./workspace:/workspace
    depends_on:
      - opencode
      - ebsprinter-db
    command: ["langgraph", "dev", "--host", "0.0.0.0", "--port", "8000"]
