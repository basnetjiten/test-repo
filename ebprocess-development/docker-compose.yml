services:

  opencode:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4096:4096"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY}
      OPENCODE_API_KEY: ${OPENCODE_API_KEY}
    volumes:
      - ~/.local/share/opencode:/root/.local/share/opencode:rw
      - ./workspace:/workspace:rw
      - ./.opencode:/.opencode:rw
      - ./.opencode:/root/.config/opencode:rw
      - .:/project:ro
    entrypoint: ["sh", "-c", "opencode serve --port 4096 --hostname 0.0.0.0 --print-logs"]

  # ── ebprocess Orchestration API ──────────────────────────────────────────
  ebprocess:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Point to the sibling opencode container by service name
      OPENCODE_SERVER_URL: http://opencode:4096
      # Paths inside the container
      WORKSPACE_DIR: /workspace
      OPENCODE_PROJECT_DIR: /.opencode
    volumes:
      # Same shared volumes so ebprocess can read/write plans and workspaces
      - ./.opencode:/.opencode
      - ./workspace:/workspace
    depends_on:
      - opencode
    command: ["langgraph", "dev", "--host", "0.0.0.0", "--port", "8000"]
